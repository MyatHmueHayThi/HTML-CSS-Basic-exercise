<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">

	<title>Container Table</title>
	<style type="text/css">
		#EA{border: 1px solid black;
			border-radius: 20px;

	</style>
</head>
<body>

     		<td>
     			<table border="2" bordercolor="blue;">
     				<tr>
     					<th>Nested Table 3</th>
     				</tr>
     				<tr>
     					<td>
     						<ul>
     							<li>LIst Object 1</li>
     							<li>List Object 2</li>
     							<li>List Object #</li>
     						</ul>
     					</td>
     				</tr>
     			</table>
     		</td>
     	</tr>
     	<tr>
     		<td>
     			<table border="2" bordercolor="black;">
     				<tr>
     					<th colspan="2">Nested table3</th>
     				</tr>
     				<tr>
     					<td>Nested Table </td>
     				    <td>Demo Continued</td>
     				</tr>
     			</table>
     		</td>
     		<td>
     			<table border="2" bordercolor="green" width="100%">
     			   <tr>
     			     <th>Nested Table</th>
     			   </tr>
     			   <tr>
     			   	  <td id="EA" >HTML</td>
     			   </tr>
     			</table>
     		</td>
  	    </tr>
  	</table>
<body>
</html>
