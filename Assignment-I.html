<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Student Registration Form</title>
	<style>
table{margin: auto;width: 75%}
   td{padding:10px; }
   h1{text-align: center;}
</style></head>
<body bgcolor="cyan">
 <form>
 	 <table border="10">
 	 	<td colspan="2"><h1>Student Registration Form </h1></td>
 	 	<tr>
 	 		<td>Name:</td>
 	 		<td><input type="text" name="name"size="30"></td>
 	 	</tr>
 	 	<tr>
 	 		<td>Father Name:</td>
 	 		<td><input type="text" name="father_name"size="30"></td>
 	 	</tr>
 	 	<tr>
 	 		<td>Postal Address</td>
 	 		<td><input type="text" name="postal_address"size="30"></td>
        </tr>
        <tr>
        	<td>Personal Address</td>
        	<td><input type="text" name="personal_address"size=30></td>
        </tr>
        <tr>
        	<td>Sex:</td>
        	<td>
        		<input type="radio" name="sex" value="male">Male
        		<input type="radio" name="sex" value="female">Female
        	</td>
        </tr>
        <tr>
        	<td>City:</td>
        	<td> <select name="city"><option>Select...&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</option></select></td>
        	<tr>
        		<td>Course:</td>
        		<td><select name="course"><option>Select...&nbsp;</option></select></td>
        	</tr>
        	<tr>
        		<td>District:</td>
        		<td><select name="district"><option>Select...&nbsp;&nbsp;&nbsp;&nbsp;</option></select></td>
        	</tr>
        	<tr>
        		<td>State:</td>
        		<td><select name="state"><option>Select...&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</option></select></td>
        	</tr>
        	<tr>
        		<td>Pin Code:</td>
        		<td><input type="text" name="pincode"></td>
        	</tr>
        	<tr>
        		<td>Email ID:</td>
        		<td><input type="email" name="email"></td>
        	</tr>
        	<tr>
        		<td>Date Of Birth</td>
        		<td><input type="date" name="dob"></td>
        	</tr>
        	<tr>
        		<td>Mobile No:</td>
        		<td><input type="text" name="mobile"></td>
        	</tr>
        	<tr>
        		<td style="text-align: left;">
        			<input type="reset" value="Reset"></td>
        		<td style="text-align: left;">
                    <input type="submit" value="Submit Form">
                </td>
             </tr>
       </table>
    </form>
</body>
</html>
