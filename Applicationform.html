<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Application Form</title>
	<style type="text/css">
		table{margin: auto;
		      width: 70%;}
		td{padding: 5px;}
	</style>
</head>
<body bgcolor="skyblue;">
  <form>
	<table border="5">
		<tr>
			<th colspan="2"><h1>Student Registration Form</h1></th>
		</tr>
        <tr>
        	<td> Name</td>
        	<td> <input type="text" name="name" size="30px;"> </td>
        </tr>
        <tr>
        	<td> Sex </td>
        	<td> <input type="radio" name="male" value="Male">Male
        	     <input type="radio" name="female" value="Female">Female</td>
        </tr>
        <tr>
        	<td> City </td>
        	<td> <select name="city"> <option> Select &nbsp; &nbsp; </option></select> </td>
        </tr>
        <tr>
        	<td> State </td>
        	<td> <select name="State"> <option> Select &nbsp; &nbsp; </option></select> </td>
        </tr>
        <tr> 
        	<td> Hobbies </td>
        	<td> <select name="hobbies">
        		   <option>Selects</option>
        		   <option value="dance">Dance</option>
        		   <option value="Cooding">Cooding</option>
        		   <option value="Reading">REading</option>
        	</select> </td>
        </tr>
    </table>
  </form>

</body>
</html>
